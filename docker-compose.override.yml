# Local development overlay. Compose loads this automatically on top of
# docker-compose.yml, so `docker compose up --build` gives you the same dev
# experience as before: published ports and a live-reloading backend.
#
# This file is NOT used in production (prod is invoked with an explicit
# `-f docker-compose.yml -f docker-compose.prod.yml`, which skips overrides).

services:
  backend:
    # Publish the API on the host for direct access / docs at :8000/docs.
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Dev keeps the ephemeral-key fallback and looser secret handling.
      ENVIRONMENT: development
    # Dev server with auto-reload, replacing the gunicorn production default.
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    # Mount source so code edits reload without a rebuild.
    volumes:
      - ./backend:/app

  frontend:
    # Serve the built SPA over plain HTTP on the host.
    ports:
      - "${FRONTEND_PORT:-80}:80"
