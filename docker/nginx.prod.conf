# Production nginx config: HTTPS + HTTP->HTTPS redirect + ACME challenge.
# Mounted over the image's HTTP-only config by docker-compose.prod.yml.
#
# PLUG IN YOUR DOMAIN: replace every occurrence of your-domain.com below
# (server_name lines and the two ssl_certificate paths).

# ── Port 80: serve the ACME challenge, redirect everything else to HTTPS ──────
server {
    listen 80;
    server_name your-domain.com www.your-domain.com;

    # Let's Encrypt HTTP-01 challenge files. Must stay reachable over plain HTTP
    # for certbot to issue and renew certificates.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else goes to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Port 443: the actual application ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com www.your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Reasonable modern TLS defaults (kept inline so the config is self-contained).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with a long cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA routing: unknown paths fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to the backend over the internal network.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Gemini-backed endpoints (course/module generation) can run close to
        # gunicorn's 120s worker timeout; keep nginx's read timeout above that
        # so it doesn't 504 a request the backend is still legitimately working on.
        proxy_connect_timeout 130s;
        proxy_send_timeout 130s;
        proxy_read_timeout 130s;
    }
}
