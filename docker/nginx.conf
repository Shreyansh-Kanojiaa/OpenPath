server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # All other routes → index.html (React SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api calls to backend so the frontend only needs one origin
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Gemini-backed endpoints (course/module generation) can run close to
        # gunicorn's 120s worker timeout; keep nginx's read timeout above that
        # so it doesn't 504 a request the backend is still legitimately working on.
        proxy_connect_timeout 130s;
        proxy_send_timeout 130s;
        proxy_read_timeout 130s;
    }
}
