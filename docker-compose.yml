# Base stack shared by dev and prod.
#
#   Local dev:   docker compose up --build
#                (docker-compose.override.yml is auto-loaded: publishes ports,
#                 runs the backend with --reload)
#
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#                (adds TLS nginx + certbot, keeps the backend off the public internet)
#
# This base intentionally publishes NO host ports. Each environment decides what to
# expose in its own overlay, so production never accidentally exposes the backend.

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openpath}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file (see .env.example)}
      POSTGRES_DB: ${POSTGRES_DB:-openpath_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openpath} -d ${POSTGRES_DB:-openpath_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  # Default command is gunicorn (see Dockerfile). The dev overlay swaps in uvicorn --reload.
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-openpath}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file (see .env.example)}@db:5432/${POSTGRES_DB:-openpath_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in your .env file (see .env.example)}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:80,http://localhost}
    depends_on:
      db:
        condition: service_healthy

  # ── React Frontend (Vite build → nginx) ─────────────────────────────────────
  # The image bakes an HTTP-only nginx config (docker/nginx.conf). The prod overlay
  # mounts docker/nginx.prod.conf over it to add TLS.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
